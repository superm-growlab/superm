<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Changuito|Super M Bot</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        :root { --p: #39ff14; --s: #bc13fe; --bg: #050505; --card: #161616; --txt: #f0f0f0; }
        body { background: var(--bg); color: var(--p); font-family: 'Courier New', monospace; padding: 20px; }
        .panel { border: 2px solid var(--p); padding: 30px; box-shadow: 0 0 20px rgba(57,255,20,0.2); max-width: 800px; margin: auto; border-radius: 15px; background: #000; }
        h1 { text-align: center; letter-spacing: 5px; text-shadow: 0 0 10px var(--p); border-bottom: 1px solid var(--s); padding-bottom: 10px; }
        
        .filtros-container { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; justify-content: center; }
        .chip-f { padding: 5px 15px; border: 1px solid var(--s); border-radius: 20px; font-size: 0.7rem; cursor: pointer; transition: 0.3s; color: var(--s); }
        .chip-f.active { background: var(--s); color: #fff; box-shadow: 0 0 10px var(--s); }

        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        input { background: #000; border: 1px solid var(--s); color: var(--p); padding: 12px; border-radius: 5px; font-family: monospace; width:100%; box-sizing:border-box; }
        textarea { background: #000; border: 1px solid var(--s); color: #fff; padding: 12px; border-radius: 5px; font-family: monospace; width:100%; box-sizing:border-box; resize: vertical; }
        .full { grid-column: span 2; }
        .btn-bot { background: var(--p); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; font-size: 1rem; }
        .btn-bot:hover { background: #fff; box-shadow: 0 0 20px var(--p); }
        #status-bot { text-align: center; margin: 15px 0; font-size: 0.8rem; color: var(--s); min-height: 1.2rem; background: rgba(188, 19, 254, 0.1); padding: 5px; border-radius: 5px; }
        #historial-bot { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; border-top: 1px dashed var(--s); padding-top: 30px; }
        
        /* Estilos heredados de index.html para la Tarjeta */
        .tarjeta { 
            background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; 
            transition: 0.3s; display: flex; flex-direction: column; overflow: hidden;
            height: 100%; cursor: pointer; text-align: left;
        }
        .tarjeta:hover { border-color: var(--p); transform: translateY(-3px); }
        .contenedor-img { 
            width: 100%; height: 220px; 
            background: #000; border-radius: 10px; display: flex; justify-content: center; 
            align-items: center; margin-bottom: 15px; overflow: hidden; border: 1px solid #222;
        }
        .img-placeholder { font-size: 3.5rem; }
        .img-real { width: 100%; height: 100%; object-fit: contain; padding: 10px; transition: 0.4s ease; }
        .btn-m { background: transparent; border: 1px solid var(--s); color: var(--s); padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.65rem; }

        #editor-producto { display: none; margin-top: 30px; border: 1px solid var(--s); padding: 20px; border-radius: 12px; background: #080808; }
        .label-edit { display: block; font-size: 0.6rem; color: var(--s); margin-bottom: 5px; font-weight: bold; }
        .preview-mini { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--p); }
        .btn-confirm { background: var(--s); color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 20px; border-radius: 5px; font-size: 1rem; }
        .badge-id { font-size: 0.5rem; color: #555; display: block; margin-bottom: 5px; }
    </style>
    <!-- Firebase SDKs (v8 compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>
</head>
<body>

    <div class="panel">
        <h1>🧪 SUPER M - ALCHEMIST BOT</h1>
        <p style="text-align:center; font-size:0.7rem;">LOG: 2024 | SYNC DIRECTA A FIREBASE</p>

        <div class="grid-form">
            <input type="text" id="link-referido" style="grid-column: span 1;" placeholder="PEGAR LINK DE PRODUCTO">
            <input type="text" id="id-manual" style="grid-column: span 1;" placeholder="O ID (EJ: NG8W...)">
            
            <button class="btn-bot full" onclick="botTransmutar()">⚡ TRANSMUTAR DATA</button>
            <div id="status-bot" class="full">SISTEMA LISTO.</div>
        </div>

        <!-- ZONA DE REVISIÓN Y EDICIÓN -->
        <div id="editor-producto" class="editor-zone">
            <h3 style="text-align:center; color: var(--p); margin-top:0;">🔍 REVISIÓN DE ALQUIMIA</h3>
            
            <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;">
                <img id="edit-preview-img" class="preview-mini" src="">
                <div style="flex:1;">
                    <span class="label-edit">TÍTULO DEL PRODUCTO</span>
                    <input type="text" id="edit-n">
                </div>
            </div>

            <div class="grid-form" style="margin-top:0;">
                <div><span class="label-edit">PRECIO ($)</span><input type="number" id="edit-p"></div>
                <div><span class="label-edit">CATEGORÍA</span><select id="edit-cat" style="background:#000; border:1px solid var(--s); color:var(--p); padding:10px; width:100%; border-radius:5px;"><option value="cat-nutricion">🧪 NUTRICIÓN</option><option value="cat-iluminacion">☀️ ILUMINACIÓN</option><option value="cat-sustratos">📦 SUSTRATOS</option><option value="cat-control">🔬 CONTROL</option><option value="cat-carpas">⛺ INDOOR</option></select></div>
                <div class="full"><span class="label-edit">DESCRIPCIÓN COMERCIAL</span><input type="text" id="edit-desc"></div>
                <div class="full"><span class="label-edit">RESUMEN TÉCNICO (Separado por |)</span><input type="text" id="edit-specs"></div>
                <div class="full"><span class="label-edit">FICHA TÉCNICA (TEXTO)</span><textarea id="edit-texto" rows="4"></textarea></div>
            </div>

            <button class="btn-confirm" onclick="cargarAFirebase()">🚀 CARGAR A LA TIENDA</button>
            <button class="btn-bot full" style="background:transparent; color:#888; border:1px solid #333; font-size:0.7rem;" onclick="cancelarEdicion()">CANCELAR</button>
        </div>

        <h2 style="margin-top:40px; font-size:1.2rem; border-bottom:1px solid var(--s); padding-bottom:10px; display: flex; justify-content: space-between; align-items: center;">
            📦 INVENTARIO EN NUBE
            <small id="contador-bot" style="color:var(--s); font-size:0.6rem;"></small>
        </h2>

        <div class="filtros-container" id="filtros-historial">
            <div class="chip-f active" data-cat="todas" onclick="filtrarHistorial('todas', this)">TODAS</div>
            <!-- Las categorías se cargarán dinámicamente aquí -->
        </div>

        <div id="historial-bot"></div>
    </div>

    <script>
        // Variable global para guardar los datos temporales mientras editas
        let productoTemporal = null;

        const firebaseConfig = {
            apiKey: "AIzaSyArXS-nRFGb7MRQ30BsPM4vYdqXWfxNdg4",
            authDomain: "super-m-growshop.firebaseapp.com",
            projectId: "super-m-growshop",
            storageBucket: "super-m-growshop.firebasestorage.app",
            messagingSenderId: "851787326044",
            appId: "1:851787326044:web:727818a787e52d9a19fc99",
            measurementId: "G-KEPKJYST55"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let todosLosProductos = []; // Almacén global para el filtrado en tiempo real

        // AL CARGAR: Sincronizar con Firestore
        window.onload = () => {
            const categoriasList = [
                { id: "cat-nutricion", n: "NUTRICIÓN" },
                { id: "cat-iluminacion", n: "ILUMINACIÓN" },
                { id: "cat-sustratos", n: "SUSTRATOS" },
                { id: "cat-control", n: "CONTROL" },
                { id: "cat-carpas", n: "INDOOR" }
            ];
            
            const fCont = document.getElementById('filtros-historial');
            categoriasList.forEach(c => {
                const div = document.createElement('div');
                div.className = 'chip-f';
                div.innerText = c.n;
                div.setAttribute('data-cat', c.id);
                div.onclick = (e) => filtrarHistorial(c.id, e.target);
                fCont.appendChild(div);
            });

            // Escuchador en tiempo real de Firebase
            db.collection("productos_tienda").orderBy("id", "desc").onSnapshot(snap => {
                todosLosProductos = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                document.getElementById('contador-bot').innerText = `${todosLosProductos.length} ÍTEMS EN NUBE`;
                
                // Mantenemos el filtro seleccionado actualmente
                const activeChip = document.querySelector('.chip-f.active');
                const currentCat = activeChip ? activeChip.getAttribute('data-cat') : 'todas';
                filtrarHistorial(currentCat);
            });
        };

        function filtrarHistorial(cat, el) {
            if (el) {
                document.querySelectorAll('.chip-f').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
            }
            
            const hist = document.getElementById('historial-bot');
            hist.innerHTML = "";
            
            const filtrados = cat === 'todas' ? todosLosProductos : todosLosProductos.filter(p => p.cat === cat);
            
            filtrados.forEach(p => {
                const wrapper = document.createElement('div');
                // Si no hay texto de ficha técnica, mostramos la descripción
                const previewFicha = p.texto || p.desc || 'Sin información extraída.';

                wrapper.innerHTML = `
                    <div class="tarjeta">
                        <span class="badge-id">ID: ${p.id}</span>
                        <div class="contenedor-img" style="height:140px;">${obtenerImagenHTML_changuito(p.i)}</div>
                        <h3 style="margin: 5px 0; font-size:0.75rem; text-align: center; color:#fff;">${p.n}</h3>
                        <div style="text-align: center; color: var(--p); font-size:0.9rem; font-weight: bold;">$${p.p.toLocaleString()}</div>
                        
                        <div style="margin-top:10px; border-top:1px solid #222; padding-top:8px;">
                            <span class="label-edit">FICHA TÉCNICA DETECTADA:</span>
                            <div style="font-size:0.55rem; color:#888; height:50px; overflow-y:auto; background:#000; padding:5px; border-radius:4px; white-space:pre-wrap;">${previewFicha}</div>
                        </div>

                        <button class="btn-bot" style="padding:8px; font-size:0.6rem; width:100%; margin-top:10px; background:#ff3131; color:white; border-radius:4px;" 
                                onclick="eliminarProducto('${p.id}')">ELIMINAR PRODUCTO</button>
                    </div>
                `;
                hist.appendChild(wrapper);
            });
        }

        async function eliminarProducto(id) {
            if (confirm("🚨 ¿Estás seguro de que deseas eliminar este producto de la nube?")) {
                try {
                    await db.collection("productos_tienda").doc(id).delete();
                    notify("🗑️ PRODUCTO ELIMINADO CON ÉXITO.");
                } catch (e) {
                    alert("Error al eliminar: " + e.message);
                }
            }
        }

        function notify(m) {
            document.getElementById('status-bot').innerText = m;
            setTimeout(() => document.getElementById('status-bot').innerText = "SISTEMA LISTO.", 3000);
        }

        // Helper function to generate image HTML, copied from index.html
        // Esto asegura que el HTML generado por el bot sea compatible con la función obtenerImagenHTML de index.html
        function obtenerImagenHTML_changuito(input) {
            let dato;
            if (Array.isArray(input)) {
                dato = input.length > 0 ? input[0] : "🌿"; // Si es array, toma el primer elemento o el ícono por defecto
            } else {
                dato = input || "🌿"; // Si es string, úsalo directamente o el ícono por defecto
            }
            
            if (typeof dato === 'string' && dato.includes("http")) return `<img src="${dato}" class="img-real">`;
            return `<div class="img-placeholder">${dato}</div>`;
        }

    async function botTransmutar() {
        // Capturar valores de los inputs correctamente
        const linkReferidoInput = document.getElementById('link-referido');
        const idManualInput = document.getElementById('id-manual');
        
        if (!linkReferidoInput || !idManualInput) {
            console.error("No se encontraron los inputs del formulario");
            return;
        }
        
        const urlInput = linkReferidoInput.value.trim();
        const idInput = idManualInput.value.trim();
        const entradaFinal = idInput || urlInput;

        const status = document.getElementById('status-bot');
        const editor = document.getElementById('editor-producto');

        // Validación de entrada
        if (!entradaFinal) {
            status.innerText = "⚠️ INGRESA UN LINK O ID PARA COMENZAR.";
            status.style.color = "orange";
            return;
        }

        console.log("🧪 Intentando transmutar entrada:", entradaFinal);
        status.innerText = "📡 CONECTANDO CON CLOUD FUNCTIONS...";
        status.style.color = "var(--s)";

        try {
            // Obtener la función Cloud de Firebase
            const functions = firebase.app().functions('us-central1');
            const obtenerProductoML = functions.httpsCallable('obtenerProductoML');
            
            // Llamar a la función con el formato correcto { url: link }
            const response = await obtenerProductoML({ url: entradaFinal });
            const data = response.data;

            // Verificar si hay error en la respuesta
            if (data.error) {
                throw new Error(data.error);
            }

            // Preparar los datos temporales para edición
            productoTemporal = {
                id: data.id || ("PROD-" + Date.now()),
                i: (data.i && Array.isArray(data.i) && data.i.length > 0) ? data.i : ["🌿"],
                linkOriginal: data.link || entradaFinal
            };

            // LLENADO DE FORMULARIO CON LOS DATOS OBTENIDOS
            document.getElementById('edit-n').value = data.n || "Producto Super M";
            document.getElementById('edit-p').value = data.p || 0;
            document.getElementById('edit-desc').value = data.desc || "Producto de alta calidad seleccionado por Super M.";
            
            // IMPORTANTE: La ficha técnica va en edit-texto (con bullets •)
            document.getElementById('edit-texto').value = data.texto || data.desc || "• Calidad: Super M Lab";
            
            // Specs separados por |
            document.getElementById('edit-specs').value = data.specs && Array.isArray(data.specs) 
                ? data.specs.join(' | ') 
                : "Calidad Super M";
            
            // Vista previa de imagen
            const imgUrl = (data.i && Array.isArray(data.i) && data.i[0] && data.i[0].includes('http')) 
                ? data.i[0] 
                : '';
            document.getElementById('edit-preview-img').src = imgUrl || "https://i.postimg.cc/rF9GqwGS/favicon.png";

            // Feedback visual - con token válido siempre debería haber datos completos
            status.innerText = "✨ TRANSMUTACIÓN EXITOSA - DATOS EXTRAÍDOS.";
            status.style.color = "var(--p)";

            // Mostrar el editor solo cuando la respuesta es exitosa
            editor.style.display = 'block';
            editor.scrollIntoView({ behavior: 'smooth' });
            
        } catch (e) {
            console.error("❌ Error completo en Alchemist Bot:", e);
            
            // Manejo específico de errores de Firebase
            let errorMessage = "Error de Laboratorio: ML bloqueó el acceso o el ID es inválido.";
            
            if (e.code) {
                switch (e.code) {
                    case 'permission-denied':
                        errorMessage = "🚫 TOKEN VENCIDO O BLOQUEADO. Actualiza el access_token en la colección 'settings/mercadolibre_auth' de Firestore.";
                        break;
                    case 'not-found':
                        errorMessage = "🔍 Producto no encontrado. Verifica el ID.";
                        break;
                    case 'resource-exhausted':
                        errorMessage = "⏳ Demasiadas peticiones. Espera un momento.";
                        break;
                    case 'unavailable':
                        errorMessage = "📡 No se pudo conectar con ML. Verifica tu conexión.";
                        break;
                    case 'internal':
                        errorMessage = "⚠️ Error interno. Intenta con otro link.";
                        break;
                    default:
                        errorMessage = `❌ Error [${e.code}]: ${e.message}`;
                }
            }
            
            status.innerText = errorMessage;
            status.style.color = "#ff3131";
            
            // No mostramos el editor si hubo error
            editor.style.display = 'none';
        }
    }

        async function cargarAFirebase() {
            if (!productoTemporal) return;
            const status = document.getElementById('status-bot');

            // Tomamos los valores actualizados del editor
            const dataFinal = {
                id: productoTemporal.id,
                cat: document.getElementById('edit-cat').value,
                n: document.getElementById('edit-n').value,
                p: parseFloat(document.getElementById('edit-p').value),
                i: productoTemporal.i,
                desc: document.getElementById('edit-desc').value.trim(),
                specs: document.getElementById('edit-specs').value.split('|').map(s => s.trim()).filter(s => s),
                linkPago: productoTemporal.linkOriginal,
                texto: document.getElementById('edit-texto').value.trim()
            };

            try {
                status.innerText = "🚀 SUBIENDO A LA NUBE...";
                // IMPORTANTE: Sincronizado con la colección que usa index.html
                await db.collection("productos_tienda").doc(dataFinal.id).set(dataFinal);
                
                // Reset
                status.innerText = "✨ PRODUCTO CARGADO EXITOSAMENTE.";
                document.getElementById('editor-producto').style.display = 'none';
                document.getElementById('link-referido').value = "";
                document.getElementById('id-manual').value = "";
                productoTemporal = null;
                
            } catch (e) {
                status.innerText = "❌ ERROR AL SUBIR: " + e.message;
            }
        }

        function cancelarEdicion() {
            document.getElementById('editor-producto').style.display = 'none';
            document.getElementById('status-bot').innerText = "OPERACIÓN CANCELADA.";
            productoTemporal = null;
        }
    </script>
</body>
</html>
