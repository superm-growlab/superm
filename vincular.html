<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincro Super M</title>
    <style>
        body { background: #050505; color: #39ff14; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 2px solid #bc13fe; padding: 30px; text-align: center; border-radius: 15px; box-shadow: 0 0 20px #bc13fe; background: #000; }
        .btn { background: #39ff14; color: #000; border: none; padding: 15px 20px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🧪 SINCRO SUPER M</h1>
        <p id="status">Cargando sistemas...</p>
        <a id="auth-link" class="btn" href="#">VINCULAR CUENTA</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        window.onload = function() {
            // 1. CONFIGURACIÓN FIREBASE
            const firebaseConfig = {
                apiKey: "AIzaSyArXS-nRFGb7MRQ30BsPM4vYdqXWfxNdg4",
                authDomain: "super-m-growshop.firebaseapp.com",
                projectId: "super-m-growshop",
                storageBucket: "super-m-growshop.firebasestorage.app",
                messagingSenderId: "851787326044",
                appId: "1:851787326044:web:727818a787e52d9a19fc99",
                measurementId: "G-KEPKJYST55"
            };

            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const db = firebase.firestore();

            // 2. CONFIGURACIÓN MERCADO LIBRE
const CLIENT_ID = "4527719550878051";
const REDIRECT_URI = "https://superm-growlab.github.io/superm/vincular.html";

// Es necesario codificar la URI para que los caracteres especiales no rompan la URL de petición
const authUrl = `https://auth.mercadolibre.com.ar/authorization?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;

document.getElementById('auth-link').href = authUrl;
            // 3. CAPTURA DE CÓDIGO
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                document.getElementById('status').innerText = "⚡ CÓDIGO DETECTADO. SINCRONIZANDO...";
                
                db.collection("settings").doc("mercadolibre_auth").set({
                    auth_code: code,
                    updated_at: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "pending_exchange"
                }, { merge: true })
                .then(() => {
                    document.getElementById('status').innerHTML = "✅ <b style='color:#39ff14'>SINCRO EXITOSA</b><br>Ya podés usar el Changuito.";
                })
                .catch((error) => {
                    document.getElementById('status').innerText = "❌ ERROR FIREBASE: " + error.message;
                });
            } else {
                document.getElementById('status').innerText = "SISTEMA LISTO PARA VINCULAR.";
            }
        };
    </script>
</body>
</html>
