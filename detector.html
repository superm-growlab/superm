<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo Alquimista | Super M Lab</title>
    <style>
        :root {
            --p: #39ff14; /* Verde Neón */
            --s: #bc13fe; /* Púrpura Neón */
            --bg: #050505;
            --card: #111;
            --text: #fff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
        }

        h1 { text-align: center; text-shadow: 0 0 10px var(--p); color: var(--p); }
        h2 { color: var(--s); text-align: center; margin-top: 30px; }

        .contenedor-principal {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 🖼️ GRILLA DE SÍNTOMAS VISUALES */
        .grilla-sintomas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .celda-sintoma {
            background: var(--card);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .celda-sintoma:hover {
            border-color: var(--p);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            transform: translateY(-3px);
        }

        .celda-sintoma.seleccionada {
            border-color: var(--p);
            box-shadow: 0 0 20px var(--p);
            background: rgba(57, 255, 20, 0.05);
        }

        .celda-sintoma img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            filter: grayscale(80%) brightness(0.8);
            transition: 0.3s;
        }

        .celda-sintoma:hover img {
            filter: grayscale(0%) brightness(1);
        }

        .celda-sintoma p {
            margin: 8px 0 0 0;
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .celda-sintoma:hover p {
            color: var(--p);
        }

        /* 🚀 UPLOADER DE FOTOS */
        .seccion-uploader {
            background: var(--card);
            border: 2px dashed var(--s);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-top: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .seccion-uploader:hover {
            background: #1a1a1a;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.2);
        }

        .seccion-uploader p { color: var(--s); font-weight: bold; }
        .icon-upload { font-size: 2rem; margin-bottom: 10px; }

        /* 🔮 PANEL DE RESULTADOS */
        #panel-resultados {
            margin-top: 30px;
            padding: 20px;
            border: 2px solid var(--p);
            border-radius: 10px;
            background: #000;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.15);
            animation: aparece 0.5s ease-out;
        }

        .loading {
            text-align: center;
            color: var(--s);
            font-style: italic;
        }

        @keyframes aparece {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }
        
        button.btn-reset {
            background: transparent;
            border: 1px solid var(--s);
            color: var(--s);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
            width: 100%;
        }
        button.btn-reset:hover {
            background: var(--s);
            color: #fff;
        }

        /* 🔍 BARRA DE BÚSQUEDA TÉCNICA */
        .buscador-adn-cont {
            width: 100%;
            margin-bottom: 20px;
            position: relative;
        }
        .input-adn {
            width: 100%;
            background: #000;
            border: 1px solid var(--s);
            padding: 15px;
            color: var(--p);
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }
        .input-adn:focus { box-shadow: 0 0 15px var(--s); }

        /*  ESTILOS PARA FUENTES Y DATOS TÉCNICOS */
        .fuente-link {
            display: inline-block;
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid var(--s);
            color: var(--s);
            padding: 4px 8px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.7rem;
            margin-right: 5px;
            margin-top: 5px;
            transition: 0.3s;
        }
        .fuente-link:hover {
            background: var(--s);
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>🔬 ORÁCULO DETECTOR HÍBRIDO</h1>

    <div class="contenedor-principal">
        
        <h2>Buscador de ADN Botánico</h2>
        <div class="buscador-adn-cont">
            <input type="text" id="search-tags" class="input-adn" placeholder="🔍 Escribe síntomas (ej: clorosis, puntas quemadas, nervadura)..." onkeyup="filtrarPorADN()">
        </div>

        <p style="text-align:center; color:#888; font-size: 0.8rem;">Selecciona una muestra de la biblioteca para el análisis de transmutación.</p>
        
        <div id="grilla-sintomas" class="grilla-sintomas"></div>

        <hr border="1" color="#222" style="margin: 40px 0;">

        <h2>Portal de Escaneo IA</h2>
        <div class="seccion-uploader" onclick="document.getElementById('file-input').click()">
            <div class="icon-upload">📸</div>
            <p>Arrastra o sube la foto de tu planta</p>
            <p style="font-size:0.7rem; color:#666;">(La IA extraerá las etiquetas de ADN y buscará coincidencias en Firestore)</p>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="simularComparacionIA()">
        </div>

        <div id="panel-resultados" class="hidden">
            <div id="contenido-resultado"></div>
            <button class="btn-reset" onclick="resetOraculo()">NUEVA CONSULTA</button>
        </div>
    </div>

    <script type="module">
        // 🧪 INTEGRACIÓN FIREBASE SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArXS-nRFGb7MRQ30BsPM4vYdqXWfxNdg4",
            authDomain: "super-m-growshop.firebaseapp.com",
            projectId: "super-m-growshop",
            storageBucket: "super-m-growshop.firebasestorage.app",
            messagingSenderId: "851787326044",
            appId: "1:851787326044:web:727818a787e52d9a19fc99",
            measurementId: "G-KEPKJYST55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const functions = getFunctions(app);
        const authInstance = getAuth(app);
        const consultarOraculoFn = httpsCallable(functions, 'consultarOraculo');
        let bibliotecaVisual = [];

        // 🌐 CONFIGURACIÓN DE FUENTES MAESTRAS (Filtro de autoridad)
        const FUENTES_MAESTRAS = [
            "Super M Lab Database",
            "AI Research Unit"
        ];

        //  CARGA DESDE FIRESTORE
        async function cargarBiblioteca() {
            const grilla = document.getElementById('grilla-sintomas');
            grilla.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:var(--s);">Sincronizando con la base de datos de ADN...</p>`;
            
            try {
                const querySnapshot = await getDocs(collection(db, "biblioteca_visual"));
                if (querySnapshot.empty) {
                    grilla.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#555;'>No se encontraron muestras en el laboratorio...</p>";
                    return;
                }
                bibliotecaVisual = querySnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));
                renderizarGaleria(bibliotecaVisual);
            } catch (error) {
                console.error("Error cargando biblioteca:", error);
                grilla.innerHTML = `<p style='grid-column: 1/-1; text-align:center; color:red;'>Error de conexión con el Oráculo.</p>`;
            }
        }

        // 🖼️ RENDERIZADO DE GALERÍA DINÁMICA
        window.renderizarGaleria = (items = []) => {
            const grilla = document.getElementById('grilla-sintomas');
            grilla.innerHTML = "";
            
            if (!items || items.length === 0) {
                grilla.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#555;'>No hay coincidencias para este patrón de ADN.</p>";
                return;
            }

            items.forEach(item => {
                const celda = document.createElement('div');
                celda.className = 'celda-sintoma';
                celda.onclick = () => window.consultarOraculo(item.id);
                // Atributo técnico para el buscador
                celda.setAttribute('data-adn', (item.tags || []).join(','));
                celda.innerHTML = `
                    <img src="${item.img}" alt="${item.titulo}">
                    <p>${item.titulo}</p>
                `;
                grilla.appendChild(celda);
            });
        };

        //  FILTRO POR ADN (TAGS)
        window.filtrarPorADN = () => {
            const busqueda = document.getElementById('search-tags').value.toLowerCase().trim();
            if (!busqueda) return renderizarGaleria(bibliotecaVisual);

            const terminos = busqueda.split(/\s+/);
            const filtrados = bibliotecaVisual.filter(item => {
                // Cruza el título y los tags del documento
                const combinedAdn = [item.titulo, ...(item.tags || [])].join(' ').toLowerCase();
                // Asegura que todos los términos buscados estén presentes (AND logic)
                return terminos.every(term => combinedAdn.includes(term));
            });
            renderizarGaleria(filtrados);
        };

        // 🔮 MOTOR DE INFERENCIA (FIREBASE CLIENT)
        window.consultarOraculo = async (idDoc) => {
            // Resaltar visualmente la selección
            document.querySelectorAll('.celda-sintoma').forEach(el => el.classList.remove('seleccionada'));

            const panel = document.getElementById('panel-resultados');
            const contenido = document.getElementById('contenido-resultado');
            
            panel.classList.remove('hidden');
            contenido.innerHTML = `<p class="loading">Iniciando Agente de Consulta Dinámica para [${idDoc}]...</p>`;
            window.scrollTo({ top: panel.offsetTop - 50, behavior: 'smooth' });

            const visualData = bibliotecaVisual.find(item => item.id === idDoc);
            if (!visualData) {
                contenido.innerHTML = `<p style="color:red;">Error: Muestra no localizada en el laboratorio.</p>`;
                return;
            }

            try {
                // 1. Intentar obtener diagnóstico estático de Firestore (Calle B)
                let diagId = visualData.id_diagnostico || (visualData.tags && visualData.tags[0]);
                let diagData = null;

                if (diagId) {
                    const diagSnap = await getDoc(doc(db, "diagnosticos", diagId));
                    if (diagSnap.exists()) {
                        diagData = diagSnap.data();
                    }
                }

                // 2. Disparar el Agente de Consulta (On-Demand Knowledge)
                await window.ejecutarAgenteConsultor(visualData, diagData);

            } catch (error) {
                console.error("Error en consulta cruzada:", error);
                contenido.innerHTML = `<p style="color:red;">Error de conexión con la Gran Biblioteca de Diagnósticos.</p>`;
            }
        };

        // 🤖 AGENTE DE CONSULTA DINÁMICA (MIGRACIÓN A GEMINI VIA CLOUD FUNCTION)
        window.ejecutarAgenteConsultor = async (item, diagExistente) => {
            const contenido = document.getElementById('contenido-resultado');
            
            contenido.innerHTML = `
                <div class="agente-badge">🤖 AGENTE DINÁMICO ACTIVO</div>
                <p class="loading">Invocando Inteligencia Gemini 1.5 Flash para:<br><strong>${item.titulo}</strong>...</p>
                <p style="font-size:0.7rem; color:#555; text-align:center;">Fuentes prioritarias: ${FUENTES_MAESTRAS.join(', ')}</p>
            `;

            let hallazgo;

            if (diagExistente) {
                // 🟢 FLUJO CACHÉ (Costo $0)
                hallazgo = { ...diagExistente, es_nuevo: false };
            } else {
                try {
                    // 🔵 FLUJO INTELIGENCIA (Cloud Function)
                    const result = await consultarOraculoFn({
                        titulo: item.titulo,
                        tags: item.tags || []
                    });
                    
                    hallazgo = { ...result.data, es_nuevo: true };

                    // 💾 AUTO-GUARDADO EN FIRESTORE
                    if (!hallazgo.error) {
                        const diagId = item.id_diagnostico || (item.tags && item.tags[0]);
                        if (diagId && authInstance.currentUser) {
                            await setDoc(doc(db, "diagnosticos", diagId), {
                                ...hallazgo,
                                usuarioId: authInstance.currentUser.uid,
                                es_nuevo: false, // Se guarda como verificado para la próxima
                                timestamp: serverTimestamp()
                            });
                            console.log("✅ Diagnóstico auto-guardado en Firestore.");
                        }
                    }
                } catch (error) {
                    console.error("Error Gemini Function:", error);
                    hallazgo = {
                        ph_rango: "Error API", ec_rango: "Error API",
                        ambiente_detalles: "Sincronización fallida.",
                        solucion_alquimista: "El Agente no pudo transmutar los datos técnicos en este momento.",
                        fuente: "N/A", es_nuevo: true
                    };
                }
            }

            contenido.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="color: var(--p); margin:0;">🔮 VERDICTO: ${item.titulo.toUpperCase()}</h3>
                    ${hallazgo.es_nuevo ? '<span style="color:var(--s); font-size:0.6rem; border:1px solid var(--s); padding:2px 5px; border-radius:4px;">IA LIVE</span>' : '<span style="color:var(--p); font-size:0.6rem; border:1px solid var(--p); padding:2px 5px; border-radius:4px;">LOCAL CACHE</span>'}
                </div>
                
                <div style="background:#111; padding:20px; border-radius:10px; border: 1px solid #222;">
                    <div style="margin-bottom: 20px;">
                        <p style="color:var(--p); font-size:0.7rem; font-weight:bold; letter-spacing:1px; margin-bottom:10px;">[ ANÁLISIS DINÁMICO DE SÍNTOMAS ]</p>
                        <p style="font-size:0.95rem; color:#eee; line-height:1.6;">${item.patrones || 'Patrón identificado mediante correspondencia visual en base de datos.'}</p>
                    </div>
                    
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom: 20px; border-top: 1px solid #222; padding-top: 20px;">
                        <div>
                            <p style="color:var(--s); font-size:0.65rem; font-weight:bold; letter-spacing:1px; margin-bottom:5px;">RANGO TÉCNICO (RED)</p>
                            <p style="font-size:0.85rem; color: #ccc;">pH: ${hallazgo.ph_rango} | EC: ${hallazgo.ec_rango}</p>
                        </div>
                        <div>
                            <p style="color:var(--s); font-size:0.65rem; font-weight:bold; letter-spacing:1px; margin-bottom:5px;">FUENTE MAESTRA</p>
                            <p style="font-size:0.85rem; color: var(--p);" class="fuente-maestra">${hallazgo.fuente || FUENTES_MAESTRAS[0]}</p>
                        </div>
                    </div>

                    <div style="background: rgba(57, 255, 20, 0.05); padding: 15px; border-radius: 8px; border-left: 4px solid var(--p);">
                        <p style="color:var(--p); font-size: 0.75rem; font-weight: bold; margin-bottom: 5px;">PROTOCOLO SUGERIDO:</p>
                        <p style="font-size:1rem; color:#fff; line-height: 1.5;">${hallazgo.solucion_alquimista}</p>
                    </div>
                    
                    <div style="margin-top:20px; border-top:1px solid #222; padding-top:15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
                        <div>
                            <span style="font-size:0.6rem; color:#444;">EVIDENCIA:</span>
                            <span class="fuente-link">📡 Datos Verificados por Super M Lab</span>
                        </div>
                    </div>
                </div>
            `;
        };

        window.sincronizarHallazgo = async (idVisual, idDiag) => {
            alert("Sincronizando hallazgo dinámico con Firestore...");
            // Aquí integrarías el setDoc para guardar el resultado de la web en tu colección de diagnosticos
        };

        // 📸 SIMULACIÓN IA
        window.simularComparacionIA = () => {
            const panel = document.getElementById('panel-resultados');
            const contenido = document.getElementById('contenido-resultado');
            panel.classList.remove('hidden');
            contenido.innerHTML = `<p class="loading">Escaneando ADN visual de la muestra...<br>Buscando etiquetas compatibles en la Biblioteca Visual...</p>`;

            setTimeout(() => {
                // Simula que la IA detectó etiquetas y encontró el ID "calcio_carencia"
                window.consultarOraculo("calcio_carencia");
            }, 2000);
        };

        window.resetOraculo = () => {
            document.getElementById('panel-resultados').classList.add('hidden');
            document.getElementById('file-input').value = "";
            document.getElementById('search-tags').value = "";
            window.renderizarGaleria(bibliotecaVisual);
            window.scrollTo(0, 0);
        };

        // Inicio
        cargarBiblioteca();
    </script>
</body>
</html>
